<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>Learn with Shan · Pro APKs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pro-apks-page {
      padding: 100px 0 60px;
      min-height: 100vh;
    }
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      color: #FFD700;
      letter-spacing: 2px;
    }
    .page-header p {
      color: #aaa;
      font-size: 1rem;
      margin-top: 8px;
    }
    .apk-grid-page {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .apk-card-page {
      background: rgba(20,20,18,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,0.1);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .apk-card-page:hover { transform: translateY(-6px); border-color: #FFD700; }
    .apk-card-page .apk-logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: cover;
      border: 2px solid rgba(255,215,0,0.15);
      margin-bottom: 12px;
    }
    .apk-card-page h4 { color: #fff; font-size: 1.1rem; margin-bottom: 4px; }
    .apk-card-page .apk-desc { color: #aaa; font-size: 0.85rem; margin: 6px 0; }
    .apk-card-page .apk-detail { color: #888; font-size: 0.78rem; line-height: 1.5; margin: 4px 0; }
    .apk-card-page .download-btn {
      display: inline-block;
      margin-top: 12px;
      background: linear-gradient(135deg, #FFD700, #e6b800);
      color: #0a0a0a;
      padding: 10px 32px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.85rem;
      transition: 0.3s;
      border: none;
      cursor: pointer;
    }
    .apk-card-page .download-btn:hover { transform: scale(1.05); }
    .apk-card-page .lock-icon { color: #FFD700; font-size: 0.8rem; margin-left: 6px; }
    .no-apps { text-align: center; color: #666; padding: 40px 0; grid-column: 1 / -1; }
    .loading-apps { text-align: center; color: #888; padding: 40px 0; grid-column: 1 / -1; }
    
    /* Login Overlay - FIXED */
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(14px);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      animation: fadeInOverlay 0.5s ease;
    }
    @keyframes fadeInOverlay {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .login-box {
      max-width: 420px; width: 90%; background: rgba(20,20,18,0.95);
      border-radius: 30px; padding: 40px 30px;
      border: 2px solid #FFD700; text-align: center;
      position: relative;
      animation: scaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes scaleIn {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .login-box .gold-border-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700, #FFA500, #FFD700, transparent);
      background-size: 300% 100%;
      animation: goldSlide 4s ease-in-out infinite;
      border-radius: 30px 30px 0 0;
    }
    @keyframes goldSlide {
      0% { background-position: -300% 0; }
      50% { background-position: 300% 0; }
      100% { background-position: -300% 0; }
    }
    .login-box .logo-img {
      width: 70px; height: 70px; border-radius: 16px; margin-bottom: 16px;
      border: 2px solid rgba(255,215,0,0.2);
    }
    .login-box h2 {
      font-family: 'Bebas Neue', sans-serif;
      color: #FFD700; font-size: 2rem;
      letter-spacing: 2px;
    }
    .login-box .sub-text {
      color: #999; font-size: 0.9rem; margin: 8px 0 24px;
    }
    .login-box .google-btn {
      width: 100%; 
      background: linear-gradient(135deg, #FFD700, #e6b800);
      color: #0a0a0a; border: none; padding: 16px;
      border-radius: 30px; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; box-shadow: 0 8px 30px rgba(255,215,0,0.2);
    }
    .login-box .google-btn:hover { 
      transform: scale(1.02); 
      box-shadow: 0 12px 40px rgba(255,215,0,0.35);
    }
    .login-box .google-btn:active { transform: scale(0.97); }
    .login-box .back-link {
      display: inline-block;
      margin-top: 16px; color: #666; font-size: 0.85rem;
      transition: 0.3s; text-decoration: none;
    }
    .login-box .back-link:hover { color: #FFD700; }
    .login-box .error-msg {
      color: #ff4444;
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }
    .admin-menu-item { display: none !important; }
    .admin-menu-item.visible { display: flex !important; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-area">
    <img class="logo-icon" src="https://i.ibb.co/ds4SFQsf/IMG-20260615-WA0025-1.webp" alt="Logo" />
    <span class="logo-text">LEARN WITH SHAN</span>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <a href="signin.html" class="signin-btn"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
  </div>
</header>

<!-- SIDE MENU -->
<div class="menu-overlay" id="menuOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <button class="close-btn" id="closeMenuBtn"><i class="fas fa-times"></i></button>
  <a href="index.html"><i class="fas fa-home"></i> Home</a>
  <a href="#proapks"><i class="fas fa-crown"></i> Pro APKs</a>
  <a href="admin.html" class="admin-menu-item" id="adminMenuItem"><i class="fas fa-user-shield"></i> Admin</a>
  <a href="index.html#transaction"><i class="fas fa-credit-card"></i> Transaction</a>
  <a href="index.html#social"><i class="fas fa-share-alt"></i> Social</a>

</nav>

<!-- PRO APKs PAGE -->
<section class="pro-apks-page container" id="proapks">
  <div class="page-header">
    <h1><i class="fas fa-crown"></i> Pro APKs</h1>
    <p id="pageSubText">Premium apps uploaded daily — sign in to download</p>
  </div>
  <div class="apk-grid-page" id="apkGrid">
    <div class="loading-apps"><i class="fas fa-spinner fa-spin"></i> Loading apps...</div>
  </div>
</section>

<!-- FLOATING WHATSAPP -->
<a href="https://wa.me/923173724356?text=Hi%20Shan!%20I%20want%20to%20join%20the%20course" target="_blank" class="float-wa" aria-label="WhatsApp">
  <i class="fab fa-whatsapp"></i>
</a>

<!-- WHATSAPP CHANNEL -->
<a href="https://whatsapp.com/channel/0029VbCdtdI3LdQWe2Zxdh3t" target="_blank" class="float-channel" aria-label="WhatsApp Channel">
  <i class="fab fa-whatsapp"></i>
  <span>Follow Channel</span>
</a>

<script src="js/firebase-config.js"></script>
<script>
  // ============================================================
  // PRO APKS PAGE - FULLY FIXED SIGN-IN
  // ============================================================

  // ===== MENU =====
  const menuToggle = document.getElementById('menuToggle');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeBtn = document.getElementById('closeMenuBtn');

  function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }

  menuToggle.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  sideMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

  // ===== CHECK ADMIN FOR MENU =====
  async function checkAdminMenu() {
    const adminMenuItem = document.getElementById('adminMenuItem');
    const user = auth.currentUser;
    if (!user) {
      adminMenuItem.classList.remove('visible');
      return;
    }
    try {
      const doc = await db.collection('settings').doc('admin').get();
      let adminEmails = [];
      if (doc.exists) {
        const data = doc.data();
        if (data.emails && Array.isArray(data.emails)) {
          adminEmails = data.emails;
        } else if (data.email) {
          adminEmails = [data.email];
        }
      }
      if (adminEmails.includes(user.email)) {
        adminMenuItem.classList.add('visible');
      } else {
        adminMenuItem.classList.remove('visible');
      }
    } catch (error) {
      adminMenuItem.classList.remove('visible');
    }
  }

  // ===== LOGIN POPUP FUNCTION - FIXED =====
  let loginPopupShown = false;
  let isSigningIn = false;

  function showLoginPopup() {
    // Agar popup already show ho raha hai toh return
    if (loginPopupShown) return;
    loginPopupShown = true;
    
    // Remove any existing overlay
    const existing = document.querySelector('.login-overlay');
    if (existing) existing.remove();
    
    const overlayDiv = document.createElement('div');
    overlayDiv.className = 'login-overlay';
    overlayDiv.id = 'loginOverlay';
    overlayDiv.innerHTML = `
      <div class="login-box">
        <div class="gold-border-top"></div>
        <img class="logo-img" src="https://i.ibb.co/ds4SFQsf/IMG-20260615-WA0025-1.webp" alt="Logo" />
        <h2>🔐 Sign In Required</h2>
        <p class="sub-text">Please sign in to access and download Pro APKs</p>
        <button class="google-btn" id="proApkLoginBtn">
          <i class="fab fa-google"></i> Sign in with Google
        </button>
        <div class="error-msg" id="loginError">Sign in failed. Please try again.</div>
        <br>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    `;
    document.body.appendChild(overlayDiv);
    
    // Sign in button - FIXED
    document.getElementById('proApkLoginBtn').addEventListener('click', function() {
      if (isSigningIn) return;
      isSigningIn = true;
      
      const errorMsg = document.getElementById('loginError');
      errorMsg.style.display = 'none';
      
      // Disable button
      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
      
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({
        prompt: 'select_account'
      });
      
      auth.signInWithPopup(provider)
        .then((result) => {
          console.log('Sign in successful:', result.user.email);
          const overlayEl = document.getElementById('loginOverlay');
          if (overlayEl) overlayEl.remove();
          loginPopupShown = false;
          isSigningIn = false;
          location.reload();
        })
        .catch((error) => {
          console.error('Sign in error:', error);
          errorMsg.style.display = 'block';
          errorMsg.textContent = 'Error: ' + error.message;
          isSigningIn = false;
          // Re-enable button
          const btn = document.getElementById('proApkLoginBtn');
          btn.disabled = false;
          btn.innerHTML = '<i class="fab fa-google"></i> Sign in with Google';
        });
    });
  }

  // ===== CHECK USER STATUS ON PAGE LOAD =====
  function checkUserAndShowPopup() {
    const user = auth.currentUser;
    const pageSubText = document.getElementById('pageSubText');
    
    if (user) {
      pageSubText.innerHTML = `✅ Signed in as <strong>${user.email}</strong> — You can download apps`;
      console.log('User is signed in:', user.email);
      loadAPKs();
    } else {
      pageSubText.innerHTML = '🔐 Please sign in to view and download Pro APKs';
      console.log('User not signed in - showing login popup');
      setTimeout(function() {
        showLoginPopup();
      }, 500);
    }
  }

  // ===== LOAD APKs =====
  function loadAPKs() {
    const grid = document.getElementById('apkGrid');
    grid.innerHTML = '<div class="loading-apps"><i class="fas fa-spinner fa-spin"></i> Loading apps...</div>';
    
    db.collection('apks').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
      if (snapshot.empty) {
        grid.innerHTML = '<div class="no-apps">No apps uploaded yet.</div>';
        return;
      }
      
      grid.innerHTML = '';
      snapshot.forEach((doc) => {
        const data = doc.data();
        const id = doc.id;
        const div = document.createElement('div');
        div.className = 'apk-card-page';
        div.innerHTML = `
          <img class="apk-logo" src="${data.logo || 'https://picsum.photos/seed/'+id+'/100/100'}" alt="${data.name}" />
          <h4>${data.name}</h4>
          <p class="apk-desc">${data.shortDesc || ''}</p>
          <p class="apk-detail">${data.details || ''}</p>
          <button class="download-btn" data-link="${data.link}" data-name="${data.name}">
            <i class="fas fa-download"></i> Download
          </button>
          <span class="lock-icon"><i class="fas fa-lock"></i></span>
        `;
        grid.appendChild(div);
        
        const btn = div.querySelector('.download-btn');
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const user = auth.currentUser;
          if (user) {
            window.open(this.dataset.link, '_blank');
          } else {
            showLoginPopup();
          }
        });
      });
    }, (error) => {
      console.error('Error loading APKs:', error);
      grid.innerHTML = '<div class="no-apps" style="color:#ff4444;">Error loading apps. Please refresh.</div>';
    });
  }

  // ===== AUTH STATE OBSERVER =====
  auth.onAuthStateChanged((user) => {
    checkAdminMenu();
    if (user) {
      const pageSubText = document.getElementById('pageSubText');
      pageSubText.innerHTML = `✅ Signed in as <strong>${user.email}</strong> — You can download apps`;
      const existing = document.querySelector('.login-overlay');
      if (existing) {
        existing.remove();
        loginPopupShown = false;
        isSigningIn = false;
      }
      loadAPKs();
    } else {
      const pageSubText = document.getElementById('pageSubText');
      pageSubText.innerHTML = '🔐 Please sign in to view and download Pro APKs';
      if (!loginPopupShown) {
        setTimeout(function() {
          showLoginPopup();
        }, 300);
      }
    }
  });

  // ===== INITIAL CHECK =====
  // Check Firebase is loaded
  if (typeof firebase === 'undefined') {
    alert('Firebase is not loaded. Please refresh the page.');
  } else {
    console.log('Firebase loaded successfully');
  }
  
  setTimeout(function() {
    const user = auth.currentUser;
    if (!user && !loginPopupShown) {
      showLoginPopup();
    }
  }, 1000);
</script>
</body>
</html>
