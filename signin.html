<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>Learn with Shan · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .signin-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background: #0b0b0b;
    }
    .signin-box {
      max-width: 420px;
      width: 100%;
      background: rgba(18,18,16,0.95);
      border-radius: 30px;
      padding: 40px 34px;
      border: 2px solid #FFD700;
      box-shadow: 0 0 60px rgba(255,215,0,0.08), inset 0 0 60px rgba(255,215,0,0.02);
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .signin-box::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(255,215,0,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .signin-box > * { position: relative; z-index: 1; }
    .signin-box .logo-icon-big {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 16px;
      border: 2px solid rgba(255,215,0,0.2);
      box-shadow: 0 0 30px rgba(255,215,0,0.1);
    }
    .signin-box h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: #FFD700;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(255,215,0,0.1);
    }
    .signin-box .sub-text {
      color: #999;
      font-size: 0.9rem;
      margin: 8px 0 28px;
      letter-spacing: 1px;
    }
    .signin-box .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .signin-box .divider::before,
    .signin-box .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
    }
    .signin-box .google-btn {
      width: 100%;
      background: linear-gradient(135deg, #FFD700, #e6b800);
      color: #0a0a0a;
      border: none;
      padding: 16px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 8px 30px rgba(255,215,0,0.2);
    }
    .signin-box .google-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 40px rgba(255,215,0,0.35);
    }
    .signin-box .google-btn:active { transform: scale(0.97); }
    .signin-box .google-btn i { font-size: 1.2rem; }
    .signin-box .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #666;
      font-size: 0.85rem;
      transition: 0.3s;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .signin-box .back-link:hover {
      color: #FFD700;
      border-bottom-color: rgba(255,215,0,0.3);
    }
    .signin-box .back-link i { margin-right: 6px; }
    .signin-box .user-info {
      background: rgba(255,215,0,0.04);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,215,0,0.1);
      transition: 0.3s;
    }
    .signin-box .user-info:hover { border-color: rgba(255,215,0,0.2); }
    .signin-box .user-info .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #FFD700;
      margin-bottom: 10px;
      box-shadow: 0 0 20px rgba(255,215,0,0.1);
    }
    .signin-box .user-info .name {
      color: #fff;
      font-weight: 600;
      font-size: 1.05rem;
    }
    .signin-box .user-info .email {
      color: #888;
      font-size: 0.85rem;
      margin-top: 2px;
    }
    .signin-box .signout-btn {
      background: transparent;
      border: 1px solid rgba(255,68,68,0.3);
      color: #ff4444;
      padding: 8px 28px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .signin-box .signout-btn:hover {
      background: rgba(255,68,68,0.1);
      border-color: rgba(255,68,68,0.5);
    }
    .signin-box .quick-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .signin-box .quick-links .back-link {
      margin-top: 0;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(255,215,0,0.04);
      border: 1px solid rgba(255,215,0,0.06);
    }
    .signin-box .quick-links .back-link:hover {
      background: rgba(255,215,0,0.08);
      border-color: rgba(255,215,0,0.15);
    }
    .signin-box .gold-border {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700, #FFA500, #FFD700, transparent);
      background-size: 300% 100%;
      animation: goldSlide 4s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes goldSlide {
      0% { background-position: -300% 0; }
      50% { background-position: 300% 0; }
      100% { background-position: -300% 0; }
    }
    @media (max-width: 480px) {
      .signin-box { padding: 30px 20px; }
      .signin-box h1 { font-size: 1.8rem; }
      .signin-box .logo-icon-big { width: 64px; height: 64px; }
    }
    .admin-menu-item { display: none !important; }
    .admin-menu-item.visible { display: flex !important; }
  </style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg-animation">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>
<div class="bg-orbs">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-area">
    <img class="logo-icon" src="https://i.ibb.co/ds4SFQsf/IMG-20260615-WA0025-1.webp" alt="Logo" />
    <span class="logo-text">LEARN WITH SHAN</span>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <a href="signin.html" class="signin-btn"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
  </div>
</header>

<!-- SIDE MENU -->
<div class="menu-overlay" id="menuOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <button class="close-btn" id="closeMenuBtn"><i class="fas fa-times"></i></button>
  <a href="index.html"><i class="fas fa-home"></i> Home</a>
  <a href="pro-apks.html"><i class="fas fa-crown"></i> Pro APKs</a>
  <a href="admin.html" class="admin-menu-item" id="adminMenuItem"><i class="fas fa-user-shield"></i> Admin</a>
  <a href="index.html#transaction"><i class="fas fa-credit-card"></i> Transaction</a>
  <a href="index.html#social"><i class="fas fa-share-alt"></i> Social</a>
  <a href="#" class="menu-highlight"><i class="fas fa-phone"></i> 0317 3724356</a>
</nav>

<!-- SIGNIN PAGE -->
<section class="signin-page">
  <div class="signin-box">
    <div class="gold-border"></div>

    <img class="logo-icon-big" src="https://i.ibb.co/ds4SFQsf/IMG-20260615-WA0025-1.webp" alt="Logo" />
    <h1>LEARN WITH SHAN</h1>
    <p class="sub-text">Sign in to access Pro APKs &amp; Admin Panel</p>

    <div id="signinContent">
      <!-- Not signed in -->
      <div id="notSignedIn">
        <button class="google-btn" id="googleSignInBtn">
          <i class="fab fa-google"></i> Sign in with Google
        </button>
        <div class="divider">or</div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>

      <!-- Signed in -->
      <div id="signedIn" style="display:none;">
        <div class="user-info">
          <img class="avatar" id="userAvatar" src="" alt="Avatar" />
          <div class="name" id="userName">User Name</div>
          <div class="email" id="userEmail">user@email.com</div>
        </div>
        <button class="signout-btn" id="signOutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        <div class="divider"></div>
        <div class="quick-links">
          <a href="index.html" class="back-link"><i class="fas fa-home"></i> Home</a>
          <a href="pro-apks.html" class="back-link"><i class="fas fa-crown"></i> Pro APKs</a>
          <a href="admin.html" class="back-link" id="adminLink"><i class="fas fa-user-shield"></i> Admin</a>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="js/firebase-config.js"></script>
<script>
  // ===== MENU =====
  const menuToggle = document.getElementById('menuToggle');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeBtn = document.getElementById('closeMenuBtn');

  function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }

  menuToggle.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  sideMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

  // ===== CHECK ADMIN FOR MENU =====
  async function checkAdminMenu() {
    const adminMenuItem = document.getElementById('adminMenuItem');
    const adminLink = document.getElementById('adminLink');
    const user = auth.currentUser;
    
    if (!user) {
      if (adminMenuItem) adminMenuItem.style.display = 'none';
      if (adminLink) adminLink.style.display = 'none';
      return;
    }
    
    try {
      const doc = await db.collection('settings').doc('admin').get();
      let adminEmails = [];
      if (doc.exists) {
        const data = doc.data();
        if (data.emails && Array.isArray(data.emails)) {
          adminEmails = data.emails;
        } else if (data.email) {
          adminEmails = [data.email];
        }
      }
      if (adminEmails.includes(user.email)) {
        if (adminMenuItem) adminMenuItem.style.display = 'flex';
        if (adminLink) adminLink.style.display = 'inline-block';
      } else {
        if (adminMenuItem) adminMenuItem.style.display = 'none';
        if (adminLink) adminLink.style.display = 'none';
      }
    } catch (error) {
      if (adminMenuItem) adminMenuItem.style.display = 'none';
      if (adminLink) adminLink.style.display = 'none';
    }
  }

  // ===== AUTH STATE =====
  const notSignedIn = document.getElementById('notSignedIn');
  const signedIn = document.getElementById('signedIn');
  const userAvatar = document.getElementById('userAvatar');
  const userName = document.getElementById('userName');
  const userEmail = document.getElementById('userEmail');

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      notSignedIn.style.display = 'none';
      signedIn.style.display = 'block';
      userAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + user.displayName + '&background=FFD700&color=000';
      userName.textContent = user.displayName || 'User';
      userEmail.textContent = user.email;
      await checkAdminMenu();
    } else {
      notSignedIn.style.display = 'block';
      signedIn.style.display = 'none';
    }
  });

  // ===== GOOGLE SIGN IN =====
  document.getElementById('googleSignInBtn').addEventListener('click', function() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then((result) => {
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');
        if (redirect) {
          window.location.href = redirect;
        }
      })
      .catch((error) => {
        alert('Sign in failed: ' + error.message);
      });
  });

  // ===== SIGN OUT =====
  document.getElementById('signOutBtn').addEventListener('click', function() {
    auth.signOut().then(() => {
      notSignedIn.style.display = 'block';
      signedIn.style.display = 'none';
    });
  });
</script>
</body>
</html>
