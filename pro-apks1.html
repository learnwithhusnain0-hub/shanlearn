<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Learn with Shan · Pro APKs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>

    <style>
        /* ============================================================
           COMPLETE STYLES - PRO APKS PAGE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0b0b;
            color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ---------- ANIMATED BACKGROUND ---------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-animation .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 215, 0, 0.12);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
        }

        .bg-animation .particle:nth-child(1) {
            left: 10%;
            animation-duration: 18s;
            animation-delay: 0s;
            width: 8px;
            height: 8px;
        }
        .bg-animation .particle:nth-child(2) {
            left: 25%;
            animation-duration: 22s;
            animation-delay: 2s;
            width: 5px;
            height: 5px;
        }
        .bg-animation .particle:nth-child(3) {
            left: 40%;
            animation-duration: 16s;
            animation-delay: 4s;
            width: 10px;
            height: 10px;
            opacity: 0.3;
        }
        .bg-animation .particle:nth-child(4) {
            left: 55%;
            animation-duration: 24s;
            animation-delay: 1s;
            width: 4px;
            height: 4px;
        }
        .bg-animation .particle:nth-child(5) {
            left: 70%;
            animation-duration: 19s;
            animation-delay: 3s;
            width: 7px;
            height: 7px;
        }
        .bg-animation .particle:nth-child(6) {
            left: 85%;
            animation-duration: 21s;
            animation-delay: 5s;
            width: 9px;
            height: 9px;
            opacity: 0.25;
        }
        .bg-animation .particle:nth-child(7) {
            left: 15%;
            animation-duration: 17s;
            animation-delay: 6s;
            width: 5px;
            height: 5px;
        }
        .bg-animation .particle:nth-child(8) {
            left: 50%;
            animation-duration: 23s;
            animation-delay: 2s;
            width: 6px;
            height: 6px;
        }
        .bg-animation .particle:nth-child(9) {
            left: 65%;
            animation-duration: 20s;
            animation-delay: 4s;
            width: 8px;
            height: 8px;
            opacity: 0.2;
        }
        .bg-animation .particle:nth-child(10) {
            left: 35%;
            animation-duration: 25s;
            animation-delay: 7s;
            width: 4px;
            height: 4px;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.06;
            animation: orbFloat 15s ease-in-out infinite;
        }

        .bg-orbs .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #FFD700;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }
        .bg-orbs .orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: #FFA500;
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }
        .bg-orbs .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #FFD700;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            opacity: 0.04;
        }

        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(60px, -40px) scale(1.1);
            }
            50% {
                transform: translate(-30px, 50px) scale(0.9);
            }
            75% {
                transform: translate(-50px, -30px) scale(1.05);
            }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ---------- HEADER ---------- */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.18);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.4));
            border-radius: 8px;
            background: #1a1a1a;
            object-fit: cover;
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #FFD700;
            line-height: 1;
        }

        .signin-btn {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .signin-btn:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .menu-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 6px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .menu-toggle:hover {
            background: rgba(255, 215, 0, 0.08);
        }

        .menu-toggle .bar {
            display: block;
            width: 26px;
            height: 3px;
            background: #FFD700;
            border-radius: 4px;
            transition: 0.3s;
        }

        .menu-toggle .bar:nth-child(2) {
            width: 20px;
        }
        .menu-toggle .bar:nth-child(3) {
            width: 24px;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -380px;
            width: 310px;
            max-width: 82vw;
            height: 100vh;
            background: rgba(12, 12, 10, 0.97);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-left: 1px solid rgba(255, 215, 0, 0.2);
            padding: 80px 28px 40px;
            z-index: 1100;
            transition: right 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: -12px 0 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }

        .side-menu.open {
            right: 0;
        }

        .side-menu .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.8rem;
            color: #FFD700;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .side-menu .close-btn:hover {
            transform: rotate(90deg);
        }

        .side-menu a {
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 16px;
            border-radius: 14px;
            color: #ccc;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.03);
        }

        .side-menu a i {
            width: 22px;
            color: #FFD700;
            font-size: 1.1rem;
        }

        .side-menu a:hover {
            background: rgba(255, 215, 0, 0.06);
            color: #FFD700;
            padding-left: 22px;
        }

        .side-menu .menu-highlight {
            color: #FFD700;
            font-weight: 700;
            border-bottom: none;
            margin-top: 16px;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1050;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ---------- PRO APKS PAGE ---------- */
        .pro-apks-page {
            padding: 100px 0 60px;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #FFD700;
            letter-spacing: 2px;
        }

        .page-header p {
            color: #aaa;
            font-size: 1rem;
            margin-top: 8px;
        }

        .apk-grid-page {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .apk-card-page {
            background: rgba(20, 20, 18, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .apk-card-page:hover {
            transform: translateY(-6px);
            border-color: #FFD700;
        }

        .apk-card-page .apk-logo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(255, 215, 0, 0.15);
            margin-bottom: 12px;
        }

        .apk-card-page h4 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .apk-card-page .apk-desc {
            color: #aaa;
            font-size: 0.85rem;
            margin: 6px 0;
        }

        .apk-card-page .apk-detail {
            color: #888;
            font-size: 0.78rem;
            line-height: 1.5;
            margin: 4px 0;
        }

        .apk-card-page .download-btn {
            display: inline-block;
            margin-top: 12px;
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            padding: 10px 32px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .apk-card-page .download-btn:hover {
            transform: scale(1.05);
        }

        .apk-card-page .lock-icon {
            color: #FFD700;
            font-size: 0.8rem;
            margin-left: 6px;
        }

        .no-apps {
            text-align: center;
            color: #666;
            padding: 40px 0;
            grid-column: 1 / -1;
        }

        .loading-apps {
            text-align: center;
            color: #888;
            padding: 40px 0;
            grid-column: 1 / -1;
        }

        /* ============================================================
           LOGIN OVERLAY - COMPLETE WITH ALL METHODS
           ============================================================ */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(16px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInOverlay 0.5s ease;
            padding: 20px;
        }

        @keyframes fadeInOverlay {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .login-box {
            max-width: 440px;
            width: 100%;
            background: rgba(20, 20, 18, 0.95);
            border-radius: 30px;
            padding: 40px 30px;
            border: 2px solid #FFD700;
            text-align: center;
            position: relative;
            animation: scaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .login-box .gold-border-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, #FFA500, #FFD700, transparent);
            background-size: 300% 100%;
            animation: goldSlide 4s ease-in-out infinite;
            border-radius: 30px 30px 0 0;
        }

        @keyframes goldSlide {
            0% {
                background-position: -300% 0;
            }
            50% {
                background-position: 300% 0;
            }
            100% {
                background-position: -300% 0;
            }
        }

        .login-box .logo-img {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .login-box h2 {
            font-family: 'Bebas Neue', sans-serif;
            color: #FFD700;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .login-box .sub-text {
            color: #999;
            font-size: 0.9rem;
            margin: 8px 0 20px;
        }

        /* Login Tabs */
        .login-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 4px;
        }

        .login-tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #888;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-tabs button.active {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
        }

        .login-tabs button:hover {
            color: #fff;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }

        .form-group input::placeholder {
            color: #555;
        }

        /* Buttons */
        .login-box .google-btn {
            width: 100%;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-box .google-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(66, 133, 244, 0.3);
        }

        .login-box .email-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-box .email-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
        }

        .login-box .email-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-box .error-msg {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        .login-box .success-msg {
            color: #4CAF50;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        .login-box .toggle-text {
            color: #666;
            font-size: 0.85rem;
            margin-top: 14px;
        }

        .login-box .toggle-text a {
            color: #FFD700;
            cursor: pointer;
            font-weight: 600;
        }

        .login-box .toggle-text a:hover {
            text-decoration: underline;
        }

        .login-box .back-link {
            display: inline-block;
            margin-top: 12px;
            color: #666;
            font-size: 0.85rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .login-box .back-link:hover {
            color: #FFD700;
        }

        .login-box .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
            color: #555;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-box .divider::before,
        .login-box .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ---------- FLOATING BUTTONS ---------- */
        .float-wa {
            position: fixed;
            bottom: 28px;
            right: 22px;
            z-index: 900;
            background: #25D366;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
            transition: 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }

        .float-wa:hover {
            transform: scale(1.06) rotate(-4deg);
        }

        .float-wa i {
            font-size: 1.8rem;
            color: white;
        }

        .float-channel {
            position: fixed;
            bottom: 28px;
            left: 22px;
            z-index: 900;
            background: rgba(37, 211, 102, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #25D366;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            text-decoration: none;
        }

        .float-channel:hover {
            background: rgba(37, 211, 102, 0.25);
            transform: scale(1.04);
            border-color: #25D366;
        }

        .float-channel i {
            font-size: 1.2rem;
        }
        .float-channel span {
            color: #fff;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 600px) {
            .site-header {
                padding: 8px 14px;
            }
            .logo-text {
                font-size: 1.1rem;
            }
            .logo-icon {
                width: 32px;
                height: 32px;
            }
            .side-menu {
                width: 270px;
                padding: 70px 18px 30px;
            }
            .float-wa {
                width: 50px;
                height: 50px;
                bottom: 18px;
                right: 14px;
            }
            .float-wa i {
                font-size: 1.6rem;
            }
            .float-channel {
                padding: 8px 14px;
                font-size: 0.65rem;
                bottom: 18px;
                left: 14px;
            }
            .float-channel i {
                font-size: 1rem;
            }
            .login-box {
                padding: 30px 20px;
            }
            .login-box h2 {
                font-size: 1.6rem;
            }
            .apk-grid-page {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 601px) and (max-width: 768px) {
            .apk-grid-page {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scrollbar Styling */
        .login-box::-webkit-scrollbar {
            width: 4px;
        }
        .login-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .login-box::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 10px;
        }

        .admin-menu-item {
            display: none !important;
        }
        .admin-menu-item.visible {
            display: flex !important;
        }
    </style>
</head>
<body>

    <!-- ANIMATED BACKGROUND -->
    <div class="bg-animation">
        <div class="particle"></div>

    <section class="pro-apks-page container" id="proapks">
        <div class="page-header">

        <i class="fab fa-whatsapp"></i>
        <span>Follow Channel</span>

    <script>
        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDr8cOagJ0dXLiil62JvH4q02mIcmxX9pc",
            authDomain: "learnwithshan-4be25.firebaseapp.com",
            projectId: "learnwithshan-4be25",
            storageBucket: "learnwithshan-4be25.firebasestorage.app",
            messagingSenderId: "632640212736",
            appId: "1:632640212736:web:554cba768fb7c0d1e46de5",
            measurementId: "G-SV6PX5N75Q"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        console.log('Firebase initialized successfully!');

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        const closeBtn = document.getElementById('closeMenuBtn');
        const headerSignInBtn = document.getElementById('headerSignInBtn');
        const adminMenuItem = document.getElementById('adminMenuItem');
        const pageSubText = document.getElementById('pageSubText');
        const apkGrid = document.getElementById('apkGrid');

        let loginPopupShown = false;
        let isSigningIn = false;

        // ============================================================
        // MENU FUNCTIONS
        // ============================================================
        function openMenu() {
            sideMenu.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            sideMenu.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', openMenu);
        closeBtn.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);
        sideMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

        // ============================================================
        // ADMIN MENU CHECK
        // ============================================================
        async function checkAdminMenu() {
            const user = auth.currentUser;
            if (!user) {
                adminMenuItem.classList.remove('visible');
                return;
            }
            try {
                const doc = await db.collection('settings').doc('admin').get();
                let adminEmails = [];
                if (doc.exists) {
                    const data = doc.data();
                    if (data.emails && Array.isArray(data.emails)) {
                        adminEmails = data.emails;
                    } else if (data.email) {
                        adminEmails = [data.email];
                    }
                }
                if (adminEmails.includes(user.email)) {
                    adminMenuItem.classList.add('visible');
                } else {
                    adminMenuItem.classList.remove('visible');
                }
            } catch (error) {
                adminMenuItem.classList.remove('visible');
            }
        }

        // ============================================================
        // LOGIN POPUP - COMPLETE WITH ALL METHODS
        // ============================================================
        function showLoginPopup() {
            if (loginPopupShown) return;
            loginPopupShown = true;

            const existing = document.querySelector('.login-overlay');
            if (existing) existing.remove();

            const overlayDiv = document.createElement('div');
            overlayDiv.className = 'login-overlay';
            overlayDiv.id = 'loginOverlay';
            overlayDiv.innerHTML = `
                    <div class="login-box">
                        <div class="gold-border-top"></div>
                        <img class="logo-img" src="https://i.ibb.co/ds4SFQsf/IMG-20260615-WA0025-1.webp" alt="Logo" />
                        <h2>🔐 Sign In</h2>
                        <p class="sub-text">Sign in to access Pro APKs</p>

                        <!-- Login Tabs -->
                        <div class="login-tabs">
                            <button class="active" data-tab="signin">Sign In</button>
                            <button data-tab="signup">Create Account</button>
                        </div>

                        <!-- Sign In Tab -->
                        <div class="tab-content active" id="tab-signin">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="loginEmail" placeholder="your@email.com" />
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="loginPassword" placeholder="Enter your password" />
                            </div>
                            <button class="email-btn" id="emailSignInBtn">
                                <i class="fas fa-sign-in-alt"></i> Sign In
                            </button>
                            <div class="divider">or</div>
                            <button class="google-btn" id="googleSignInBtn">
                                <i class="fab fa-google"></i> Sign in with Google
                            </button>
                            <div class="error-msg" id="loginError">Invalid credentials. Please try again.</div>
                        </div>

                        <!-- Sign Up Tab -->
                        <div class="tab-content" id="tab-signup">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="signupName" placeholder="Your full name" />
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="signupEmail" placeholder="your@email.com" />
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="signupPassword" placeholder="Min 6 characters" />
                            </div>
                            <button class="email-btn" id="emailSignUpBtn">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                            <div class="divider">or</div>
                            <button class="google-btn" id="googleSignUpBtn">
                                <i class="fab fa-google"></i> Sign up with Google
                            </button>
                            <div class="error-msg" id="signupError">Error creating account. Please try again.</div>
                            <div class="success-msg" id="signupSuccess">Account created successfully! Signing in...</div>
                        </div>

                        <br>
                        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
                    </div>
                `;
            document.body.appendChild(overlayDiv);

            // ===== TAB SWITCHING =====
            const tabs = overlayDiv.querySelectorAll('.login-tabs button');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const tabName = this.dataset.tab;
                    overlayDiv.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                    const targetTab = overlayDiv.querySelector(`#tab-${tabName}`);
                    if (targetTab) targetTab.classList.add('active');
                    // Clear errors
                    overlayDiv.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
                    overlayDiv.querySelectorAll('.success-msg').forEach(el => el.style.display = 'none');
                });
            });

            // ===== SIGN IN WITH EMAIL =====
            overlayDiv.querySelector('#emailSignInBtn').addEventListener('click', function() {
                const email = overlayDiv.querySelector('#loginEmail').value.trim();
                const password = overlayDiv.querySelector('#loginPassword').value.trim();
                const errorEl = overlayDiv.querySelector('#loginError');

                if (!email || !password) {
                    errorEl.textContent = 'Please enter both email and password.';
                    errorEl.style.display = 'block';
                    return;
                }

                this.disabled = true;
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                errorEl.style.display = 'none';

                auth.signInWithEmailAndPassword(email, password)
                    .then((result) => {
                        console.log('Email sign in successful:', result.user.email);
                        closeLoginPopup();
                    })
                    .catch((error) => {
                        errorEl.textContent = error.message;
                        errorEl.style.display = 'block';
                        this.disabled = false;
                        this.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    });
            });

            // ===== SIGN UP WITH EMAIL =====
            overlayDiv.querySelector('#emailSignUpBtn').addEventListener('click', function() {
                const name = overlayDiv.querySelector('#signupName').value.trim();
                const email = overlayDiv.querySelector('#signupEmail').value.trim();
                const password = overlayDiv.querySelector('#signupPassword').value.trim();
                const errorEl = overlayDiv.querySelector('#signupError');
                const successEl = overlayDiv.querySelector('#signupSuccess');

                if (!name || !email || !password) {
                    errorEl.textContent = 'Please fill all fields.';
                    errorEl.style.display = 'block';
                    return;
                }

                if (password.length < 6) {
                    errorEl.textContent = 'Password must be at least 6 characters.';
                    errorEl.style.display = 'block';
                    return;
                }

                this.disabled = true;
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
                errorEl.style.display = 'none';
                successEl.style.display = 'none';

                auth.createUserWithEmailAndPassword(email, password)
                    .then((result) => {
                        // Update profile with name
                        return result.user.updateProfile({
                            displayName: name
                        }).then(() => {
                            return result.user;
                        });
                    })
                    .then((user) => {
                        successEl.textContent = 'Account created successfully! Welcome ' + name;
                        successEl.style.display = 'block';
                        console.log('Account created:', user.email);
                        setTimeout(() => {
                            closeLoginPopup();
                        }, 1500);
                    })
                    .catch((error) => {
                        errorEl.textContent = error.message;
                        errorEl.style.display = 'block';
                        this.disabled = false;
                        this.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    });
            });

            // ===== SIGN IN WITH GOOGLE =====
            function handleGoogleSignIn() {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                auth.signInWithPopup(provider)
                    .then((result) => {
                        console.log('Google sign in successful:', result.user.email);
                        closeLoginPopup();
                    })
                    .catch((error) => {
                        alert('Google sign in failed: ' + error.message);
                    });
            }

            overlayDiv.querySelector('#googleSignInBtn').addEventListener('click', handleGoogleSignIn);
            overlayDiv.querySelector('#googleSignUpBtn').addEventListener('click', handleGoogleSignIn);

            // ===== ENTER KEY SUPPORT =====
            overlayDiv.querySelectorAll('input').forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const activeTab = overlayDiv.querySelector('.tab-content.active');
                        const btn = activeTab.querySelector('.email-btn');
                        if (btn) btn.click();
                    }
                });
            });
        }

        // ===== CLOSE LOGIN POPUP =====
        function closeLoginPopup() {
            const overlayEl = document.getElementById('loginOverlay');
            if (overlayEl) overlayEl.remove();
            loginPopupShown = false;
            isSigningIn = false;
            location.reload();
        }

        // ===== HEADER SIGN IN BUTTON =====
        headerSignInBtn.addEventListener('click', function() {
            const user = auth.currentUser;
            if (user) {
                // If signed in, show user info or sign out option
                if (confirm(`Signed in as ${user.email}\nDo you want to sign out?`)) {
                    auth.signOut();
                }
            } else {
                showLoginPopup();
            }
        });

        // ============================================================
        // LOAD APKS
        // ============================================================
        function loadAPKs() {
            apkGrid.innerHTML = '<div class="loading-apps"><i class="fas fa-spinner fa-spin"></i> Loading apps...</div>';

            db.collection('apks').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
                if (snapshot.empty) {
                    apkGrid.innerHTML = '<div class="no-apps">No apps uploaded yet.</div>';
                    return;
                }

                apkGrid.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    const div = document.createElement('div');
                    div.className = 'apk-card-page';
                    div.innerHTML = `
                            <img class="apk-logo" src="${data.logo || 'https://picsum.photos/seed/'+id+'/100/100'}" alt="${data.name}" />
                            <h4>${data.name}</h4>
                            <p class="apk-desc">${data.shortDesc || ''}</p>
                            <p class="apk-detail">${data.details || ''}</p>
                            <button class="download-btn" data-link="${data.link}" data-name="${data.name}">
                                <i class="fas fa-download"></i> Download
                            </button>
                            <span class="lock-icon"><i class="fas fa-lock"></i></span>
                        `;
                    apkGrid.appendChild(div);

                    const btn = div.querySelector('.download-btn');
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const user = auth.currentUser;
                        if (user) {
                            window.open(this.dataset.link, '_blank');
                        } else {
                            showLoginPopup();
                        }
                    });
                });
            }, (error) => {
                console.error('Error loading APKs:', error);
                apkGrid.innerHTML = '<div class="no-apps" style="color:#ff4444;">Error loading apps. Please refresh.</div>';
            });
        }

        // ============================================================
        // AUTH STATE OBSERVER
        // ============================================================
        auth.onAuthStateChanged((user) => {
            checkAdminMenu();

            if (user) {
                pageSubText.innerHTML = `✅ Signed in as <strong>${user.email}</strong> — You can download apps`;
                headerSignInBtn.innerHTML = `<i class="fas fa-user"></i> ${user.displayName || user.email.split('@')[0]}`;
                // Close popup if open
                const existing = document.querySelector('.login-overlay');
                if (existing) {
                    existing.remove();
                    loginPopupShown = false;
                }
                loadAPKs();
            } else {
                pageSubText.innerHTML = '🔐 Please sign in to view and download Pro APKs';
                headerSignInBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                if (!loginPopupShown) {
                    setTimeout(() => {
                        showLoginPopup();
                    }, 500);
                }
            }
        });

        // ============================================================
        // INITIAL LOAD
        // ============================================================
        // Check if Firebase is loaded
        if (typeof firebase === 'undefined') {
            alert('Firebase is not loaded. Please refresh the page.');
        } else {
            console.log('Firebase loaded successfully');
        }

        // Load APKs if user is already signed in
        setTimeout(() => {
            const user = auth.currentUser;
            if (user) {
                loadAPKs();
            }
        }, 1000);

        console.log('Pro APKs page loaded successfully!');
    </script>
