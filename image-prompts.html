        a { text-decoration: none; color: inherit; }

        /* ---------- ANIMATED BACKGROUND ---------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-animation .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 215, 0, 0.12);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
        }

        .bg-animation .particle:nth-child(1) {
            left: 10%;
            animation-duration: 18s;
            animation-delay: 0s;
            width: 8px;
            height: 8px;
        }
        .bg-animation .particle:nth-child(2) {
            left: 25%;
            animation-duration: 22s;
            animation-delay: 2s;
            width: 5px;
            height: 5px;
        }
        .bg-animation .particle:nth-child(3) {
            left: 40%;
            animation-duration: 16s;
            animation-delay: 4s;
            width: 10px;
            height: 10px;
            opacity: 0.3;
        }
        .bg-animation .particle:nth-child(4) {
            left: 55%;
            animation-duration: 24s;
            animation-delay: 1s;
            width: 4px;
            height: 4px;
        }
        .bg-animation .particle:nth-child(5) {
            left: 70%;
            animation-duration: 19s;
            animation-delay: 3s;
            width: 7px;
            height: 7px;
        }
        .bg-animation .particle:nth-child(6) {
            left: 85%;
            animation-duration: 21s;
            animation-delay: 5s;
            width: 9px;
            height: 9px;
            opacity: 0.25;
        }
        .bg-animation .particle:nth-child(7) {
            left: 15%;
            animation-duration: 17s;
            animation-delay: 6s;
            width: 5px;
            height: 5px;
        }
        .bg-animation .particle:nth-child(8) {
            left: 50%;
            animation-duration: 23s;
            animation-delay: 2s;
            width: 6px;
            height: 6px;
        }
        .bg-animation .particle:nth-child(9) {
            left: 65%;
            animation-duration: 20s;
            animation-delay: 4s;
            width: 8px;
            height: 8px;
            opacity: 0.2;
        }
        .bg-animation .particle:nth-child(10) {
            left: 35%;
            animation-duration: 25s;
            animation-delay: 7s;
            width: 4px;
            height: 4px;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.06;
            animation: orbFloat 15s ease-in-out infinite;
        }

        .bg-orbs .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #FFD700;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }
        .bg-orbs .orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: #FFA500;
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }
        .bg-orbs .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #FFD700;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            opacity: 0.04;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(-50px, -30px) scale(1.05); }
        }

        .logo-area {

        .menu-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 6px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .menu-toggle:hover { background: rgba(255, 215, 0, 0.08); }
        .menu-toggle .bar {
            display: block;
            width: 26px;
            height: 3px;
            background: #FFD700;
            border-radius: 4px;
            transition: 0.3s;
        }
        .menu-toggle .bar:nth-child(2) { width: 20px; }
        .menu-toggle .bar:nth-child(3) { width: 24px; }

        .side-menu {

            overflow-y: auto;

        .side-menu.open { right: 0; }

        .menu-overlay {

            z-index: 1050;
            opacity: 0;
            pointer-events: none;

            font-size: 1rem;

        }

        /* ---------- SEARCH & FILTER ---------- */
        .search-section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            align-items: center;
            justify-content: center;
        }

        .search-section input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        .search-section input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .search-section input::placeholder { color: #555; }

        .search-section .filter-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-section .filter-btns button {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
        }

        .search-section .filter-btns button:hover {
            border-color: #FFD700;
            color: #fff;
        }

        .search-section .filter-btns button.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFD700;
            color: #FFD700;
        }

        /* ---------- PROMPTS GRID ---------- */
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .prompt-card {
            background: rgba(20, 20, 18, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 24px;
            padding: 24px;
            transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        .prompt-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.06);
        }

        .prompt-card .prompt-image {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            object-fit: cover;
            border: 1px solid rgba(255, 215, 0, 0.08);
            margin-bottom: 12px;
            background: #1a1a1a;
        }

        .prompt-card .prompt-category {
            display: inline-block;
            font-size: 0.65rem;
            background: rgba(255, 215, 0, 0.08);
            color: #FFD700;
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            margin-bottom: 8px;
        }

        .prompt-card .prompt-text {
            color: #ddd;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .prompt-card .prompt-description {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .prompt-card .prompt-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 215, 0, 0.05);
            align-items: center;
            justify-content: space-between;
        }

        .prompt-card .prompt-actions .left-actions {
            display: flex;
            gap: 8px;
        }

        .prompt-card .prompt-actions button {
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .prompt-card .prompt-actions .copy-btn {
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
        }

        .prompt-card .prompt-actions .copy-btn:hover {
            transform: scale(1.05);
        }

        .prompt-card .prompt-actions .copy-count {
            color: #666;
            font-size: 0.7rem;
        }

        .prompt-card .prompt-actions .copy-count i {
            color: #FFD700;
            margin-right: 4px;
        }

        .prompt-card .prompt-meta {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .no-prompts {
            text-align: center;
            color: #666;
            padding: 60px 20px;

        .no-prompts i {
            font-size: 3rem;

            border: 1px solid rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #25D366;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            text-decoration: none;
        }

        .float-channel:hover {
            background: rgba(37, 211, 102, 0.25);
            transform: scale(1.04);
            border-color: #25D366;
        }
        .float-channel i { font-size: 1.2rem; }
        .float-channel span { color: #fff; }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 600px) {
            .site-header { padding: 8px 14px; }
            .logo-text { font-size: 1.1rem; }
            .logo-icon { width: 32px; height: 32px; }
            .side-menu { width: 270px; padding: 70px 18px 30px; }
            .float-wa { width: 50px; height: 50px; bottom: 18px; right: 14px; }
            .float-wa i { font-size: 1.6rem; }
            .float-channel { padding: 8px 14px; font-size: 0.65rem; bottom: 18px; left: 14px; }
            .float-channel i { font-size: 1rem; }
            .prompts-grid { grid-template-columns: 1fr; }
            .search-section input { max-width: 100%; }
        }

        @media (min-width: 601px) and (max-width: 768px) {
            .prompts-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .admin-menu-item {
            display: none !important;
        }
        .admin-menu-item.visible {
            display: flex !important;
        }
    </style>
</head>

    <script>
        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDr8cOagJ0dXLiil62JvH4q02mIcmxX9pc",
            authDomain: "learnwithshan-4be25.firebaseapp.com",
            projectId: "learnwithshan-4be25",
            storageBucket: "learnwithshan-4be25.firebasestorage.app",
            messagingSenderId: "632640212736",
            appId: "1:632640212736:web:554cba768fb7c0d1e46de5",
            measurementId: "G-SV6PX5N75Q"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        console.log('Firebase initialized successfully!');

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        const closeBtn = document.getElementById('closeMenuBtn');

        const promptsGrid = document.getElementById('promptsGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.getElementById('filterBtns');

        let currentFilter = 'all';

        // ============================================================
        // MENU FUNCTIONS
        // ============================================================
        function openMenu() {
            sideMenu.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            sideMenu.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', openMenu);
        closeBtn.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);
        sideMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

        // ============================================================
        // LOAD PROMPTS
        // ============================================================
        function loadPrompts() {
            db.collection('prompts').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                if (snapshot.empty) {
                    promptsGrid.innerHTML = `
                        <div class="no-prompts">
                            <i class="fas fa-image"></i>
                            <p>No prompts available yet.</p>
                            <p style="color:#444; font-size:0.85rem;">Check back later for new prompts.</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;

                    const imgSrc = data.image || 'https://picsum.photos/seed/' + id + '/400/200';

                    html += `
                        <div class="prompt-card" data-category="${data.category || 'Other'}" data-text="${data.text || ''}" data-description="${data.description || ''}">
                            <img class="prompt-image" src="${imgSrc}" alt="Prompt sample image" />
                            <div class="prompt-category">${data.category || 'Other'}</div>
                            ${data.description ? `<div class="prompt-description">📝 ${data.description}</div>` : ''}
                            <div class="prompt-text">${data.text || ''}</div>
                            <div class="prompt-actions">
                                <div class="left-actions">
                                    <button class="copy-btn" data-id="${id}" data-text="${(data.text || '').replace(/"/g, '&quot;')}">
                                        <i class="fas fa-copy"></i> Copy
                                    </button>
                                </div>
                                <span class="copy-count"><i class="fas fa-copy"></i> ${data.copies || 0} copies</span>
                            </div>
                            <div class="prompt-meta">
                                <span>${data.category || 'Other'}</span>
                                <span>${data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : ''}</span>
                            </div>
                        </div>
                    `;
                });

                promptsGrid.innerHTML = html;

                // Copy button handlers with counter
                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const text = this.dataset.text;
                        const id = this.dataset.id;

                        // Copy to clipboard
                        navigator.clipboard.writeText(text).then(() => {
                            // Increment counter in Firebase
                            db.collection('prompts').doc(id).update({
                                copies: firebase.firestore.FieldValue.increment(1)
                            }).catch(err => console.error('Error updating count:', err));

                            // Show feedback
                            const originalText = this.innerHTML;
                            this.innerHTML = '<i class="fas fa-check"></i> Copied!';
                            setTimeout(() => {
                                this.innerHTML = originalText;
                            }, 2000);
                        }).catch(() => {
                            // Fallback
                            const textarea = document.createElement('textarea');
                            textarea.value = text;
                            document.body.appendChild(textarea);
                            textarea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textarea);

                            // Still increment counter
                            db.collection('prompts').doc(id).update({
                                copies: firebase.firestore.FieldValue.increment(1)
                            }).catch(err => console.error('Error updating count:', err));

                            const originalText = this.innerHTML;
                            this.innerHTML = '<i class="fas fa-check"></i> Copied!';
                            setTimeout(() => {
                                this.innerHTML = originalText;
                            }, 2000);
                        });
                    });
                });

                // Apply current filter and search
                applyFilters();

            }, (error) => {
                console.error('Error loading prompts:', error);
                promptsGrid.innerHTML = `
                    <div class="no-prompts">
                        <i class="fas fa-exclamation-triangle" style="color:#ff4444;"></i>
                        <p style="color:#ff4444;">Error loading prompts. Please refresh.</p>
                    </div>
                `;
            });
        }

        // ============================================================
        // FILTER & SEARCH
        // ============================================================
        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.prompt-card');

            let visibleCount = 0;
            cards.forEach(card => {
                const category = card.dataset.category.toLowerCase();
                const text = card.dataset.text.toLowerCase();
                const description = card.dataset.description.toLowerCase();

                const matchesCategory = currentFilter === 'all' || category === currentFilter.toLowerCase();
                const matchesSearch = text.includes(searchTerm) || description.includes(searchTerm) || category.includes(searchTerm);

                if (matchesCategory && matchesSearch) {
                    card.style.display = '';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            const noResults = document.querySelector('.no-results');
            if (visibleCount === 0 && cards.length > 0) {
                if (!noResults) {
                    const div = document.createElement('div');
                    div.className = 'no-prompts no-results';
                    div.innerHTML = `
                        <i class="fas fa-search"></i>
                        <p>No prompts found matching your search.</p>
                        <p style="color:#444; font-size:0.85rem;">Try a different keyword.</p>
                    `;
                    promptsGrid.appendChild(div);
                }
            } else {
                const existing = document.querySelector('.no-results');
                if (existing) existing.remove();
            }
        }

        // ============================================================
        // SEARCH INPUT
        // ============================================================
        searchInput.addEventListener('input', applyFilters);

        // ============================================================
        // FILTER BUTTONS
        // ============================================================
        filterBtns.addEventListener('click', function(e) {
            if (e.target.tagName === 'BUTTON') {
                filterBtns.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                applyFilters();
            }
        });

        // ============================================================
        // INITIAL LOAD
        // ============================================================
        if (typeof firebase === 'undefined') {
            alert('Firebase is not loaded. Please refresh the page.');
        } else {
            console.log('Firebase loaded successfully');
        }

        loadPrompts();
        console.log('Image Prompts page loaded successfully!');
    </script>
</body>
</html>
