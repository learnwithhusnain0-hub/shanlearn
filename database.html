// Check if ad has been shown before in this session
let adShown = sessionStorage.getItem('adShown') === 'true';

function redirectToAd() {
  if (!adShown) {
    adShown = true;
    sessionStorage.setItem('adShown', 'true');
    window.location.href = AD_LINK;
    return true;
  }
  return false;
}

// ============================================================
// MENU FUNCTIONS
// ============================================================
const menuToggle = document.getElementById('menuToggle');
const sideMenu = document.getElementById('sideMenu');
const overlay = document.getElementById('menuOverlay');
const closeBtn = document.getElementById('closeMenuBtn');

function openMenu() {
  sideMenu.classList.add('active');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeMenu() {
  sideMenu.classList.remove('active');
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

menuToggle.addEventListener('click', openMenu);
closeBtn.addEventListener('click', closeMenu);
overlay.addEventListener('click', closeMenu);
sideMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

// ============================================================
// SEARCH HISTORY
// ============================================================
function getHistory() {
  try {
    return JSON.parse(localStorage.getItem('simSearchHistory') || '[]');
  } catch { return []; }
}

function saveHistory(query) {
  let history = getHistory();
  history = history.filter(item => item !== query);
  history.unshift(query);
  if (history.length > 10) history.pop();
  localStorage.setItem('simSearchHistory', JSON.stringify(history));
  updateHistoryUI();
}

function updateHistoryUI() {
  const history = getHistory();
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  
  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  list.innerHTML = history.map(item => 
    `<span class="history-item" onclick="searchHistory('${escapeHtml(item)}')">${escapeHtml(item)}</span>`
  ).join('');
}

function searchHistory(query) {
  document.getElementById('searchInput').value = query;
  $('#searchForm').submit();
}

function clearHistory() {
  localStorage.removeItem('simSearchHistory');
  updateHistoryUI();
}

// ============================================================
// COPY TO CLIPBOARD - No redirect, just copy
// ============================================================
function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
    }, 2000);
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    textarea.remove();
    btn.classList.add('copied');
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
    }, 2000);
  });
}

// ============================================================
// PHONE NUMBER CLEANING
// ============================================================
function cleanPhoneNumber(input) {
  let cleaned = input.trim().replace(/\s+/g, '');
  cleaned = cleaned.replace(/^(\+92|0092)/, '');
  cleaned = cleaned.replace(/^0+/, '');
  cleaned = cleaned.replace(/\D/g, '');
  if (cleaned.length === 10 && cleaned.startsWith('3')) return cleaned;
  if (cleaned.length > 10 && cleaned.startsWith('3')) return cleaned.slice(-10);
  return cleaned;
}

// ============================================================
// API CALL - Redirect to ad only on first click
// ============================================================
const API_URL = "https://famofc.site/api/database.php";
let isSearching = false;

$('#searchForm').on('submit', function(e) {
  e.preventDefault();
  if (isSearching) return;
  
  let rawInput = $('#searchInput').val().trim();
  if (!rawInput) { 
    alert('⚠️ Please enter a mobile number or CNIC'); 
    return; 
  }

  const cleanCNIC = rawInput.replace(/\D/g, '');
  const isCNIC = cleanCNIC.length === 13;
  const cleanPhone = cleanPhoneNumber(rawInput);
  const isPhone = /^3\d{9}$/.test(cleanPhone);

  if (!isCNIC && !isPhone) {
    $('#resultsContainer').addClass('active');
    $('#resultsContent').html(`<div class="error-message"><i class="fas fa-exclamation-triangle"></i><div>❌ Invalid Format!</div><div style="font-size: 13px; margin-top: 8px;">Please enter valid:<br>• Phone: 3XXXXXXXXX (10 digits)<br>• CNIC: 12345-1234567-1 (13 digits)</div></div>`);
    return;
  }

  saveHistory(rawInput);
  
  // Redirect to ad only ONCE per session (first click)
  if (!adShown) {
    adShown = true;
    sessionStorage.setItem('adShown', 'true');
    window.location.href = AD_LINK;
    return;
  }
  
  // If ad already shown, perform search directly
  performSearch(rawInput);
});

// ============================================================
// PERFORM SEARCH
// ============================================================
function performSearch(rawInput) {
  if (isSearching) return;
  isSearching = true;

  $('#resultsContainer').addClass('active');
  $('#resultsContent').html(`
    <div class="loading">
      <i class="fas fa-spinner fa-pulse"></i>
      <div>🔍 Searching Database...</div>
      <div style="font-size: 13px; margin-top: 8px; color: #555;">Query: ${escapeHtml(rawInput)}</div>
    </div>
  `);

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 20000);

  fetch(`${API_URL}?q=${encodeURIComponent(rawInput)}`, {
    method: 'GET',
    signal: controller.signal,
    headers: { 'Accept': 'application/json' }
  })
  .then(response => {
    clearTimeout(timeoutId);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  })
  .then(data => {
    console.log("API Response:", data);
    
    if (data.success === true && data.data) {
      const record = data.data.records && data.data.records.length > 0 ? data.data.records[0] : null;
      if (record && (record.full_name || record.phone || record.cnic)) {
        displayData(record, rawInput, data.data.search_type);
      } else {
        $('#resultsContent').html(`<div class="error-message"><i class="fas fa-database"></i><div>❌ NO DATA FOUND</div><div style="font-size: 13px;">Query: ${escapeHtml(rawInput)} not found</div></div>`);
      }
    } else if (data.success === true && data.records && data.records.length > 0) {
      displayData(data.records[0], rawInput);
    } else {
      $('#resultsContent').html(`<div class="error-message"><i class="fas fa-database"></i><div>❌ NO DATA FOUND</div><div style="font-size: 13px;">Query: ${escapeHtml(rawInput)} not found</div><div style="font-size: 11px; margin-top: 8px;">${data.error || 'No records found'}</div></div>`);
    }
  })
  .catch(error => {
    console.error("API Error:", error);
    $('#resultsContent').html(`<div class="error-message"><i class="fas fa-times-circle"></i><div>⚠️ CONNECTION ERROR</div><div style="font-size: 12px;">Unable to connect to database. Please check your connection.</div><div style="font-size: 11px; margin-top: 8px;">${error.message}</div></div>`);
  })
  .finally(() => {
    isSearching = false;
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-search"></i> SCAN DATABASE';
  });
}

// ============================================================
// DISPLAY DATA
// ============================================================
function displayData(record, query, searchType = null) {
  const name = record.full_name || record.FullName || record.Name || record.name || 'N/A';
  const mobile = record.phone || record.Phone || record.Mobile || record.mobile || record.number || query;
  const cnic = record.cnic || record.CNIC || record.NIC || record.nic || record.id_number || 'N/A';
  const address = record.address || record.Address || record.full_address || 'N/A';
  const father = record.father_name || record.FatherName || record.father || null;
  const owner = record.owner_name || record.OwnerName || record.owner || null;

  const formattedCNIC = cnic !== 'N/A' && cnic.length === 13 ? 
    `${cnic.substr(0,5)}-${cnic.substr(5,7)}-${cnic.substr(12,1)}` : cnic;

  const formattedMobile = mobile !== 'N/A' && mobile.length === 10 && mobile.startsWith('3') ? 
    `0${mobile}` : mobile;

  let html = `<div class="data-grid">`;
  
  const fields = [
    { label: 'FULL NAME', value: name, icon: 'fa-user' },
    { label: 'MOBILE NUMBER', value: formattedMobile, icon: 'fa-phone-alt' },
    { label: 'CNIC NUMBER', value: formattedCNIC, icon: 'fa-id-card' }
  ];
  
  if (father && father !== 'N/A') {
    fields.push({ label: "FATHER'S NAME", value: father, icon: 'fa-user-tie' });
  }
  
  if (owner && owner !== 'N/A') {
    fields.push({ label: 'OWNER NAME', value: owner, icon: 'fa-user-check' });
  }
  
  fields.forEach(field => {
    html += `
      <div class="data-card">
        <div class="card-icon"><i class="fas ${field.icon}"></i></div>
        <div class="card-label">${field.label}</div>
        <div class="card-value">${escapeHtml(field.value)}
          <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(field.value)}', this)"><i class="fas fa-copy"></i> Copy</button>
        </div>
      </div>
    `;
  });
  
  if (address && address !== 'N/A') {
    html += `
      <div class="data-card" style="grid-column:1/-1;">
        <div class="card-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div class="card-label">ADDRESS</div>
        <div class="card-value">${escapeHtml(address)}
          <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(address)}', this)"><i class="fas fa-copy"></i> Copy</button>
        </div>
      </div>
    `;
  }
  
  html += `</div>`;

  html += `
    <div class="action-buttons">
      <button class="action-btn" onclick="shareResult('${escapeHtml(name)}', '${escapeHtml(formattedMobile)}')">
        <i class="fas fa-share-alt"></i> Share Result
      </button>
      <button class="action-btn" onclick="downloadResult()">
        <i class="fas fa-download"></i> Download
      </button>
      <button class="action-btn" onclick="clearHistory(); location.reload();">
        <i class="fas fa-undo"></i> New Search
      </button>
    </div>
  `;

  html += `
    <div class="api-info">
      <div class="api-credit"><i class="fas fa-database"></i> <strong>Data Source:</strong> Premium SIM Database</div>
      <div class="api-credit" style="margin-top: 5px;"><i class="fas fa-check-circle"></i> Real-time SIM Database | Live Lookup</div>
      <div class="api-credit" style="margin-top: 5px; font-size: 11px;"><i class="fas fa-search"></i> Searched: ${escapeHtml(query)}</div>
    </div>
  `;

  $('#resultsContent').html(html);
}

// ============================================================
// SHARE & DOWNLOAD FUNCTIONS
// ============================================================
function shareResult(name, mobile) {
  const text = `📱 SIM Database Result\n👤 Name: ${name}\n📞 Mobile: ${mobile}\n🔍 Searched via Learn With Shan Database`;
  if (navigator.share) {
    navigator.share({ title: 'SIM Database Result', text: text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('✅ Result copied to clipboard! Share it anywhere.');
    });
  }
}

function downloadResult() {
  const content = document.querySelector('.data-grid');
  if (!content) return;
  
  const text = content.innerText || content.textContent;
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sim-database-result-${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function escapeHtml(str) {
  if (!str || str === 'N/A') return 'N/A';
  return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// ============================================================
// INIT
// ============================================================
$(document).ready(function() {
  $('#searchInput').focus();
  updateHistoryUI();
});
</script>
