  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-page {
      padding: 100px 0 60px;
      min-height: 100vh;
    }
    .admin-page .admin-box {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(20,20,18,0.9);
      border-radius: 30px;
      padding: 30px;
      border: 1px solid rgba(255,215,0,0.2);
    }
    .admin-page .admin-box h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: #FFD700;
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 20px;
    }
    .admin-page .form-group { margin-bottom: 14px; }
    .admin-page .form-group label {
      display: block;
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .admin-page .form-group input,
    .admin-page .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.15);
      background: rgba(0,0,0,0.4);
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Montserrat', sans-serif;
      outline: none;
      transition: 0.3s;
    }
    .admin-page .form-group input:focus,
    .admin-page .form-group textarea:focus { border-color: #FFD700; }
    .admin-page .form-group textarea { resize: vertical; min-height: 60px; }
    .admin-page .btn-submit {
      background: linear-gradient(135deg, #FFD700, #e6b800);
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 700;
      color: #0a0a0a;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      transition: 0.3s;
    }
    .admin-page .btn-submit:hover { transform: scale(1.02); }
    .admin-page .admin-list {
      margin-top: 20px;
      border-top: 1px solid rgba(255,215,0,0.1);
      padding-top: 16px;
    }
    .admin-page .admin-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,215,0,0.05);
    }
    .admin-page .admin-item .info { flex: 1; }
    .admin-page .admin-item .info h4 { color: #fff; font-size: 0.9rem; }
    .admin-page .admin-item .info p { color: #888; font-size: 0.75rem; }
    .admin-page .admin-item .delete-btn {
      background: rgba(255,0,0,0.2);
      border: 1px solid rgba(255,0,0,0.3);
      color: #ff4444;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: 0.3s;
    }
    .admin-page .admin-item .delete-btn:hover { background: rgba(255,0,0,0.3); }
    .admin-page .login-section {
      text-align: center;
      padding: 20px 0;
    }
    .admin-page .login-section .google-btn {
      background: linear-gradient(135deg, #4285F4, #34A853);
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }
    .admin-page .login-section .google-btn:hover { transform: scale(1.02); }
    .admin-page .login-section p { color: #666; margin-top: 12px; font-size: 0.8rem; }
    .admin-page .admin-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 10px 16px;
      background: rgba(255,215,0,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.1);
    }
    .admin-page .admin-status .status-text { color: #FFD700; font-weight: 600; }
    .admin-page .admin-status .logout-btn {
      background: transparent;
      border: 1px solid rgba(255,0,0,0.3);
      color: #ff4444;
      padding: 4px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .admin-page .admin-status .logout-btn:hover { background: rgba(255,0,0,0.1); }
    .upload-section { display: none; }
    .upload-section.active { display: block; }
    .login-section { display: block; }
    .login-section.hidden { display: none; }
    .access-denied {
      text-align: center;
      padding: 40px 20px;
      color: #ff4444;
    }
    .access-denied i { font-size: 3rem; margin-bottom: 16px; display: block; }
    .access-denied h2 { color: #fff; margin-bottom: 8px; }
    .access-denied p { color: #888; }
    .access-denied .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #FFD700;
      text-decoration: underline;
    }
    .admin-menu-item { display: none !important; }
    .admin-menu-item.visible { display: flex !important; }
  </style>
</head>

<!-- ADMIN PAGE -->
<section class="admin-page container">
  <div class="admin-box">
    <h1><i class="fas fa-user-shield"></i> Admin Panel</h1>
    
    <!-- Access Denied -->
    <div id="accessDenied" style="display:none;">
      <div class="access-denied">
        <i class="fas fa-lock"></i>
        <h2>Access Denied</h2>
        <p>You do not have permission to access the admin panel.</p>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

    </div>

    <!-- Login Section -->
    <div class="login-section" id="loginSection">
      <button class="google-btn" id="googleLoginBtn">
        <i class="fab fa-google"></i> Sign in with Google
      </button>

    </div>

    <!-- Upload Section -->
    <div class="upload-section" id="uploadSection">
      <div class="admin-status">
        <span class="status-text"><i class="fas fa-check-circle"></i> Logged in as Admin</span>
        <button class="logout-btn" id="adminLogoutBtn">Logout</button>
      </div>
      
      <div class="form-group">
        <label>App Name</label>
        <input type="text" id="apkName" placeholder="Enter app name" />
      </div>
      <div class="form-group">

        <input type="text" id="apkShortDesc" placeholder="Short description" />
      </div>
      <div class="form-group">
        <label>App Details (3-4 sentences)</label>
        <textarea id="apkDetails" placeholder="Detailed information about the app"></textarea>
      </div>
      <div class="form-group">
        <label>Drive Download Link</label>
        <input type="url" id="apkLink" placeholder="https://drive.google.com/..." />
      </div>
      <div class="form-group">
        <label>App Logo URL</label>
        <input type="url" id="apkLogo" placeholder="https://example.com/logo.png" />
      </div>
      <button class="btn-submit" id="uploadApkBtn"><i class="fas fa-upload"></i> Upload APK</button>
      
      <div class="admin-list" id="adminApkList">
        <h4 style="color:#aaa; font-size:0.8rem; margin-bottom:10px;">Uploaded Apps</h4>
        <p style="color:#666; font-size:0.8rem;">Loading...</p>
      </div>
    </div>
  </div>

<script src="js/firebase-config.js"></script>
<script>
  // ===== MENU =====
  const menuToggle = document.getElementById('menuToggle');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeBtn = document.getElementById('closeMenuBtn');

  function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }

  menuToggle.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  sideMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

  // ===== ADMIN LOGIC =====
  const loginSection = document.getElementById('loginSection');
  const uploadSection = document.getElementById('uploadSection');
  const accessDenied = document.getElementById('accessDenied');
  const googleLoginBtn = document.getElementById('googleLoginBtn');
  const adminLogoutBtn = document.getElementById('adminLogoutBtn');
  const adminMenuItem = document.getElementById('adminMenuItem');

  let adminEmails = [];

  async function loadAdminEmails() {
    try {
      const doc = await db.collection('settings').doc('admin').get();
      if (doc.exists) {
        const data = doc.data();
        if (data.emails && Array.isArray(data.emails)) {
          adminEmails = data.emails;
        } else if (data.email) {
          adminEmails = [data.email];
        }
      }
      return adminEmails;
    } catch (error) {
      console.error('Error loading admin emails:', error);
      return [];
    }
  }

  async function isUserAdmin(user) {
    if (!user) return false;
    await loadAdminEmails();
    return adminEmails.includes(user.email);
  }

  function updateUI(isAdmin, isLoggedIn) {
    loginSection.classList.add('hidden');
    uploadSection.classList.remove('active');
    accessDenied.style.display = 'none';
    adminMenuItem.classList.remove('visible');
    
    if (!isLoggedIn) {
      loginSection.classList.remove('hidden');
    } else if (isLoggedIn && isAdmin) {
      uploadSection.classList.add('active');
      adminMenuItem.classList.add('visible');
    } else if (isLoggedIn && !isAdmin) {
      accessDenied.style.display = 'block';
    }
  }

  // ===== GOOGLE SIGN IN =====
  function handleGoogleSignIn() {
    console.log('Google Sign In clicked');
    
    if (typeof firebase === 'undefined') {
      alert('Firebase is not loaded. Please refresh the page.');
      return;
    }
    
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then(async (result) => {
        console.log('Signed in:', result.user.email);
        const isAdmin = await isUserAdmin(result.user);
        if (isAdmin) {
          updateUI(true, true);
          loadAdminAPKs();
        } else {
          alert('You are not authorized as admin.');
          auth.signOut();
          updateUI(false, false);
        }
      })
      .catch((error) => {
        console.error('Sign in error:', error);
        alert('Sign in failed: ' + error.message);
      });
  }

  // Attach event listener
  googleLoginBtn.addEventListener('click', handleGoogleSignIn);

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      const isAdmin = await isUserAdmin(user);
      updateUI(isAdmin, true);
      if (isAdmin) {
        loadAdminAPKs();
      }
    } else {
      updateUI(false, false);
    }
  });

  adminLogoutBtn.addEventListener('click', function() {
    auth.signOut();
    updateUI(false, false);
  });

  // ===== Upload APK =====
  document.getElementById('uploadApkBtn').addEventListener('click', function() {
    const name = document.getElementById('apkName').value.trim();
    const shortDesc = document.getElementById('apkShortDesc').value.trim();
    const details = document.getElementById('apkDetails').value.trim();
    const link = document.getElementById('apkLink').value.trim();
    const logo = document.getElementById('apkLogo').value.trim();

    if (!name || !link) {
      alert('App Name and Drive Link are required.');
      return;
    }

    db.collection('apks').add({
      name: name,
      shortDesc: shortDesc || '',
      details: details || '',
      link: link,
      logo: logo || '',
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      alert('APK uploaded successfully!');
      document.getElementById('apkName').value = '';
      document.getElementById('apkShortDesc').value = '';
      document.getElementById('apkDetails').value = '';
      document.getElementById('apkLink').value = '';
      document.getElementById('apkLogo').value = '';
      loadAdminAPKs();
    }).catch((error) => {
      alert('Error uploading: ' + error.message);
    });
  });

  // ===== Load APKs in admin =====
  function loadAdminAPKs() {
    const list = document.getElementById('adminApkList');
    db.collection('apks').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
      if (snapshot.empty) {
        list.innerHTML = '<p style="color:#666; font-size:0.8rem;">No apps uploaded yet.</p>';
        return;
      }
      let html = '<h4 style="color:#aaa; font-size:0.8rem; margin-bottom:10px;">Uploaded Apps</h4>';
      snapshot.forEach((doc) => {
        const data = doc.data();
        html += `
          <div class="admin-item">
            <div class="info">
              <h4>${data.name}</h4>
              <p>${data.shortDesc || ''}</p>
            </div>
            <button class="delete-btn" data-id="${doc.id}">Delete</button>
          </div>
        `;
      });
      list.innerHTML = html;
      
      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          if (confirm('Delete this app?')) {
            db.collection('apks').doc(this.dataset.id).delete()
              .then(() => {})
              .catch((err) => alert('Error: ' + err.message));
          }
        });
      });
    });
  }

  // Initial load
  loadAdminEmails();
</script>
</body>
