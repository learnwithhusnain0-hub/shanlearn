<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
        }

        *:focus {
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        input:focus, button:focus, a:focus, div:focus {
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        body {
            background: #0b0b0b;
            color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-animation .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 215, 0, 0.12);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
        }

        .bg-animation .particle:nth-child(1) { left: 10%; animation-duration: 18s; animation-delay: 0s; width: 8px; height: 8px; }
        .bg-animation .particle:nth-child(2) { left: 25%; animation-duration: 22s; animation-delay: 2s; width: 5px; height: 5px; }
        .bg-animation .particle:nth-child(3) { left: 40%; animation-duration: 16s; animation-delay: 4s; width: 10px; height: 10px; opacity: 0.3; }
        .bg-animation .particle:nth-child(4) { left: 55%; animation-duration: 24s; animation-delay: 1s; width: 4px; height: 4px; }
        .bg-animation .particle:nth-child(5) { left: 70%; animation-duration: 19s; animation-delay: 3s; width: 7px; height: 7px; }
        .bg-animation .particle:nth-child(6) { left: 85%; animation-duration: 21s; animation-delay: 5s; width: 9px; height: 9px; opacity: 0.25; }
        .bg-animation .particle:nth-child(7) { left: 15%; animation-duration: 17s; animation-delay: 6s; width: 5px; height: 5px; }
        .bg-animation .particle:nth-child(8) { left: 50%; animation-duration: 23s; animation-delay: 2s; width: 6px; height: 6px; }
        .bg-animation .particle:nth-child(9) { left: 65%; animation-duration: 20s; animation-delay: 4s; width: 8px; height: 8px; opacity: 0.2; }
        .bg-animation .particle:nth-child(10) { left: 35%; animation-duration: 25s; animation-delay: 7s; width: 4px; height: 4px; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.06;
            animation: orbFloat 15s ease-in-out infinite;
        }

        .bg-orbs .orb:nth-child(1) { width: 400px; height: 400px; background: #FFD700; top: -10%; left: -10%; animation-delay: 0s; }
        .bg-orbs .orb:nth-child(2) { width: 350px; height: 350px; background: #FFA500; bottom: -10%; right: -10%; animation-delay: -5s; }
        .bg-orbs .orb:nth-child(3) { width: 300px; height: 300px; background: #FFD700; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; opacity: 0.04; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(-50px, -30px) scale(1.05); }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.18);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.4));
            border-radius: 8px;
            background: #1a1a1a;
            object-fit: cover;
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #FFD700;
            line-height: 1;
        }

        .signin-btn {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .signin-btn:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .menu-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 6px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .menu-toggle:hover {
            background: rgba(255, 215, 0, 0.08);
        }

        .menu-toggle .bar {
            display: block;
            width: 26px;
            height: 3px;
            background: #FFD700;
            border-radius: 4px;
            transition: 0.3s;
        }
        .menu-toggle .bar:nth-child(2) { width: 20px; }
        .menu-toggle .bar:nth-child(3) { width: 24px; }

        /* Side Menu */
        .side-menu {
            position: fixed;
            top: 0;
            right: -380px;
            width: 310px;
            max-width: 82vw;
            height: 100vh;
            background: rgba(12, 12, 10, 0.97);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-left: 1px solid rgba(255, 215, 0, 0.2);
            padding: 80px 28px 40px;
            z-index: 1100;
            transition: right 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: -12px 0 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }

        .side-menu.open { right: 0; }
        .side-menu .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.8rem;
            color: #FFD700;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .side-menu .close-btn:hover { transform: rotate(90deg); }
        .side-menu a {
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 16px;
            border-radius: 14px;
            color: #ccc;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.03);
        }
        .side-menu a i { width: 22px; color: #FFD700; font-size: 1.1rem; }
        .side-menu a:hover { background: rgba(255, 215, 0, 0.06); color: #FFD700; padding-left: 22px; }
        .side-menu .menu-highlight { color: #FFD700; font-weight: 700; border-bottom: none; margin-top: 16px; }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1050;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
        }
        .menu-overlay.active { opacity: 1; pointer-events: auto; }

        /* Main Page */
        .pro-apks-page {
            padding: 100px 0 60px;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #FFD700;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 40px rgba(255, 215, 0, 0.15); }
            50% { text-shadow: 0 0 80px rgba(255, 215, 0, 0.3), 0 0 120px rgba(255, 215, 0, 0.1); }
        }

        .page-header .sub-text-animated {
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700, #FFA500, #FFD700);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.1rem;
            font-weight: 600;
            animation: shimmerText 5s ease-in-out infinite;
            margin-top: 8px;
        }

        @keyframes shimmerText {
            0% { background-position: -400% 0; }
            50% { background-position: 400% 0; }
            100% { background-position: -400% 0; }
        }

        /* Search & Categories */
        .search-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .search-section input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }

        .search-section input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .search-section input::placeholder {
            color: #555;
        }

        /* Category Filters */
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .category-filters .cat-btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #aaa;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-filters .cat-btn:hover {
            border-color: #FFD700;
            color: #fff;
            transform: translateY(-2px);
        }

        .category-filters .cat-btn.active {
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            border-color: #FFD700;
        }

        /* APK Grid */
        .apk-grid-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* Mobile: 1 column */
        @media (max-width: 768px) {
            .apk-grid-page {
                grid-template-columns: 1fr;
            }
        }

        .apk-card-page {
            background: rgba(20, 20, 18, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            position: relative;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .apk-card-page:hover {
            transform: translateY(-6px);
            border-color: #FFD700;
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.08);
        }

        .apk-card-page .apk-logo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(255, 215, 0, 0.15);
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .apk-card-page:hover .apk-logo {
            border-color: #FFD700;
            transform: scale(1.05);
        }

        .apk-card-page h4 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .apk-card-page .apk-desc {
            color: #aaa;
            font-size: 0.85rem;
            margin: 6px 0;
        }

        .apk-card-page .apk-detail {
            color: #888;
            font-size: 0.78rem;
            line-height: 1.5;
            margin: 4px 0;
        }

        .apk-card-page .category-tag {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 6px 0;
        }

        .apk-card-page .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .apk-card-page .download-btn {
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .apk-card-page .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .apk-card-page .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .apk-card-page .share-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .apk-card-page .share-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFD700;
            color: #FFD700;
            transform: scale(1.05);
        }

        /* Download Progress (inline) */
        .download-progress-container {
            margin-top: 10px;
            display: none;
            padding: 0 10px;
        }

        .download-progress-container.visible {
            display: block;
            animation: fadeUp 0.3s ease;
        }

        .download-progress-container .progress-step-text {
            color: #FFD700;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .download-progress-container .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .download-progress-container .progress-track .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .download-progress-container .progress-status {
            color: #888;
            font-size: 0.65rem;
            margin-top: 4px;
        }

        .no-apps {
            text-align: center;
            color: #666;
            padding: 40px 0;
            grid-column: 1 / -1;
        }

        .loading-apps {
            text-align: center;
            color: #888;
            padding: 40px 0;
            grid-column: 1 / -1;
        }

        /* Share Modal */
        .share-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInOverlay 0.4s ease;
            padding: 20px;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .share-modal-box {
            max-width: 480px;
            width: 100%;
            background: rgba(20, 20, 18, 0.95);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            text-align: center;
            animation: scaleIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .share-modal-box .share-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.6rem;
            color: #666;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .share-modal-box .share-close:hover { color: #FFD700; transform: rotate(90deg); }

        .share-modal-box .share-title {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .share-modal-box .share-sub {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .share-modal-box .share-link-box {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .share-modal-box .share-link-box input {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 0.8rem;
            font-family: 'Montserrat', sans-serif;
        }

        .share-modal-box .share-link-box .copy-btn {
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .share-modal-box .share-link-box .copy-btn:hover {
            transform: scale(1.05);
        }

        .share-modal-box .share-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .share-modal-box .share-icons .share-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .share-modal-box .share-icons .share-icon:hover {
            transform: scale(1.12) translateY(-3px);
        }

        .share-modal-box .share-icons .share-icon.whatsapp { background: #25D366; }
        .share-modal-box .share-icons .share-icon.facebook { background: #1877F2; }
        .share-modal-box .share-icons .share-icon.twitter { background: #000; }
        .share-modal-box .share-icons .share-icon.copy-icon { background: #FFD700; color: #0a0a0a; }

        /* Admin Menu */
        .admin-menu-item { display: none !important; }
        .admin-menu-item.visible { display: flex !important; }

        /* Floating Buttons */
        .float-wa {
            position: fixed;
            bottom: 28px;
            right: 22px;
            z-index: 900;
            background: #25D366;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
            transition: 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }
        .float-wa:hover { transform: scale(1.06) rotate(-4deg); }
        .float-wa i { font-size: 1.8rem; color: white; }

        .float-channel {
            position: fixed;
            bottom: 28px;
            left: 22px;
            z-index: 900;
            background: rgba(37, 211, 102, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #25D366;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            text-decoration: none;
        }
        .float-channel:hover {
            background: rgba(37, 211, 102, 0.25);
            transform: scale(1.04);
            border-color: #25D366;
        }
        .float-channel i { font-size: 1.2rem; }
        .float-channel span { color: #fff; }

        /* Responsive */
        @media (max-width: 600px) {
            .site-header { padding: 8px 14px; }
            .logo-text { font-size: 1.1rem; }
            .logo-icon { width: 32px; height: 32px; }

            let visibleCount = 0;
            cards.forEach(card => {
                const name = card.querySelector('h4')?.textContent?.toLowerCase() || '';

                const detail = card.querySelector('.apk-detail')?.textContent?.toLowerCase() || '';
                const category = card.dataset.category?.toLowerCase() || '';

                const matchesSearch = name.includes(searchTerm) || desc.includes(searchTerm) || detail.includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || category === selectedCategory.toLowerCase();

                if (matchesSearch && matchesCategory) {
                    card.style.display = '';
                    visibleCount++;
                } else {
                    card.style.display = 'none';

            });

            const noResults = document.querySelector('.no-search-results');
            if (visibleCount === 0 && cards.length > 0) {

            if (!btn) return;

            categoryFilters.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCategory = btn.dataset.category;
            filterApps();
        });

        // ============================================================
        // SHARE FUNCTION
        // ============================================================
        function showShareModal(appName) {
            const websiteUrl = window.location.href;
            
            const overlayDiv = document.createElement('div');
            overlayDiv.className = 'share-modal-overlay';
            overlayDiv.id = 'shareModal';
            overlayDiv.innerHTML = `
                <div class="share-modal-box">
                    <button class="share-close" id="closeShareModal"><i class="fas fa-times"></i></button>
                    <div class="share-title">📤 Share "${appName}"</div>
                    <div class="share-sub">Share this app with your friends!</div>
                    <div class="share-link-box">
                        <input type="text" id="shareLinkInput" value="${websiteUrl}" readonly />
                        <button class="copy-btn" id="copyShareLink"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                    <div class="share-icons">
                        <button class="share-icon whatsapp" data-share="whatsapp"><i class="fab fa-whatsapp"></i></button>
                        <button class="share-icon facebook" data-share="facebook"><i class="fab fa-facebook-f"></i></button>
                        <button class="share-icon twitter" data-share="twitter"><i class="fab fa-x-twitter"></i></button>
                        <button class="share-icon copy-icon" id="copyIconShare"><i class="fas fa-link"></i></button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlayDiv);

            document.getElementById('closeShareModal').addEventListener('click', function() {
                overlayDiv.remove();
            });
            overlayDiv.addEventListener('click', function(e) {
                if (e.target === this) overlayDiv.remove();
            });

            document.getElementById('copyShareLink').addEventListener('click', function() {
                const input = document.getElementById('shareLinkInput');
                input.select();
                navigator.clipboard.writeText(input.value).then(() => {
                    this.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(() => {
                        this.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    }, 2000);
                });
            });

            document.getElementById('copyIconShare').addEventListener('click', function() {
                const input = document.getElementById('shareLinkInput');
                input.select();
                navigator.clipboard.writeText(input.value).then(() => {
                    alert('✅ Link copied to clipboard!');
                });
            });

            document.querySelectorAll('[data-share]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const platform = this.dataset.share;
                    const url = encodeURIComponent(websiteUrl);
                    const text = encodeURIComponent(`Check out "${appName}" on Learn with Shan!`);
                    let shareUrl = '';

                    switch(platform) {
                        case 'whatsapp':
                            shareUrl = `https://wa.me/?text=${text}%20${url}`;
                            break;
                        case 'facebook':
                            shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`;
                            break;
                        case 'twitter':
                            shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
                            break;
                    }
                    if (shareUrl) window.open(shareUrl, '_blank');
                });
            });
        }

        // ============================================================
        // DOWNLOAD FUNCTION - 3 STEP PROCESS
        // ============================================================
        function handleDownload(btn, link, appName) {
            const card = btn.closest('.apk-card-page');
            const progressContainer = card.querySelector('.download-progress-container');
            const stepText = progressContainer.querySelector('.progress-step-text');
            const progressFill = progressContainer.querySelector('.progress-fill');
            const statusText = progressContainer.querySelector('.progress-status');

            // Initialize click count for this app
            const appId = appName + '_' + link;
            if (!appClickCounts[appId]) {
                appClickCounts[appId] = 0;
            }
            
            appClickCounts[appId]++;

            // If 3rd click → Direct download
            if (appClickCounts[appId] >= 3) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-download"></i> Download';
                progressContainer.classList.remove('visible');
                window.open(link, '_blank');
                return;
            }

            // Show progress
            progressContainer.classList.add('visible');
            btn.disabled = true;

            const stepNumber = appClickCounts[appId];
            stepText.textContent = `Step ${stepNumber} of 2`;
            statusText.textContent = '⏳ Loading...';
            progressFill.style.width = '0%';

            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                progressFill.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    statusText.textContent = '✅ Complete!';
                    
                    setTimeout(() => {
                        // Hide progress
                        progressContainer.classList.remove('visible');
                        btn.disabled = false;
                        
                        // After step 1: Ask to click again
                        if (stepNumber === 1) {
                            btn.innerHTML = '<i class="fas fa-arrow-right"></i> Click Again to Continue';
                        } 
                        // After step 2: Redirect to ad
                        else if (stepNumber === 2) {
                            btn.innerHTML = '<i class="fas fa-download"></i> Click to Download';
                            // Redirect to Ad
                            window.open('https://www.effectivecpmnetwork.com/adn4vbfxd?key=2cacfcc9ad73d277be2f0380847ea510', '_blank');
                        }
                    }, 500);
                }
            }, 50);
        }

        // ============================================================
        // LOAD APKs FROM FIRESTORE
        // ============================================================
        function loadAPKs() {
            apkGrid.innerHTML = '<div class="loading-apps"><i class="fas fa-spinner fa-spin"></i> Loading apps...</div>';

            db.collection('apks').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
                if (snapshot.empty) {
                    apkGrid.innerHTML = '<div class="no-apps">No apps uploaded yet.</div>';
                    return;
                }

                apkGrid.innerHTML = '';
                allApps = [];

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    const category = data.category || 'Uncategorized';
                    allApps.push({ id, ...data });

                    const div = document.createElement('div');
                    div.className = 'apk-card-page';
                    div.dataset.category = category;
                    div.style.animationDelay = (allApps.length * 0.05) + 's';
                    div.innerHTML = `
                        <img class="apk-logo" src="${data.logo || 'https://picsum.photos/seed/'+id+'/100/100'}" alt="${data.name}" />
                        <h4>${data.name}</h4>
                        <p class="apk-desc">${data.shortDesc || ''}</p>
                        <span class="category-tag"><i class="fas fa-tag"></i> ${category}</span>
                        <p class="apk-detail">${data.details || ''}</p>
                        <div class="button-group">
                            <button class="download-btn" data-link="${data.link}" data-name="${data.name}">
                                <i class="fas fa-download"></i> Download
                            </button>
                            <button class="share-btn" data-name="${data.name}">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                        <div class="download-progress-container">
                            <div class="progress-step-text">Step 1 of 2</div>
                            <div class="progress-track">
                                <div class="progress-fill"></div>
                            </div>
                            <div class="progress-status">⏳ Loading...</div>
                        </div>
                    `;
                    apkGrid.appendChild(div);

                    // Download button
                    const downloadBtn = div.querySelector('.download-btn');
                    downloadBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const link = this.dataset.link;
                        const name = this.dataset.name;

                        if (!link) {
                            alert('Download link not available.');
                            return;
                        }

                        handleDownload(this, link, name);
                    });

                    // Share button
                    const shareBtn = div.querySelector('.share-btn');
                    shareBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const name = this.dataset.name;
                        showShareModal(name);
                    });
                });

                setTimeout(filterApps, 100);

            }, (error) => {
                console.error('Error loading APKs:', error);
                apkGrid.innerHTML = '<div class="no-apps" style="color:#ff4444;">Error loading apps. Please refresh.</div>';
            });
        }

        // ============================================================
        // AUTH STATE OBSERVER
        // ============================================================
        auth.onAuthStateChanged((user) => {
            checkAdminMenu();

            if (user) {
                headerSignInBtn.innerHTML = `<i class="fas fa-user"></i> ${user.displayName || user.email.split('@')[0]}`;
                const existing = document.querySelector('.login-overlay');
                if (existing) {
                    existing.remove();
                    loginPopupShown = false;
                }
                loadAPKs();
            } else {
                headerSignInBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                loadAPKs();
            }
        });

        // ============================================================
        // INITIAL CHECK
        // ============================================================
        if (typeof firebase === 'undefined') {
            alert('Firebase is not loaded. Please refresh the page.');
        } else {
            console.log('Firebase loaded successfully');
        }

        console.log('Pro APKs page loaded successfully!');
    </script>
</body>
</html>
