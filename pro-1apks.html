  async function checkAdminMenu() {
    const user = auth.currentUser;
    if (!user) {
      adminMenuItem.classList.remove('visible');
      return;
    }
    try {
      const doc = await db.collection('settings').doc('admin').get();
      let adminEmails = [];
      if (doc.exists) {
        const data = doc.data();
        if (data.emails && Array.isArray(data.emails)) {
          adminEmails = data.emails;
        } else if (data.email) {
          adminEmails = [data.email];
        }
      }
      if (adminEmails.includes(user.email)) {
        adminMenuItem.classList.add('visible');
      } else {
        adminMenuItem.classList.remove('visible');
      }
    } catch (error) {
      adminMenuItem.classList.remove('visible');
    }

    popup.classList.add('active');

      popup.classList.remove('active');
      confirmBtn.removeEventListener('click', handleConfirm);
      closeBtn.removeEventListener('click', handleClose);

    const handleClose = function() {

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="your@email.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" />
          </div>
          <button class="email-btn" id="emailSignUpBtn">
            <i class="fas fa-user-plus"></i> Create Account
          </button>
          <div class="divider">or</div>
          <button class="google-btn" id="googleSignUpBtn">
            <i class="fab fa-google"></i> Sign up with Google
          </button>
          <div class="error-msg" id="signupError">Error creating account. Please try again.</div>
          <div class="success-msg" id="signupSuccess">Account created! Please check your email for verification.</div>
        </div>
        <br>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    `;
    document.body.appendChild(overlayDiv);

    // Close button
    document.getElementById('closeLoginPopupBtn').addEventListener('click', function() {
      closeLoginPopup();
    });
    overlayDiv.addEventListener('click', function(e) {
      if (e.target === this) closeLoginPopup();
    });

    // Tab switching
    const tabs = overlayDiv.querySelectorAll('.login-tabs button');
    tabs.forEach(tab => {
      tab.addEventListener('click', function() {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tabName = this.dataset.tab;
        overlayDiv.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        const targetTab = overlayDiv.querySelector(`#tab-${tabName}`);
        if (targetTab) targetTab.classList.add('active');
        overlayDiv.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
        overlayDiv.querySelectorAll('.success-msg').forEach(el => el.style.display = 'none');
      });
    });

    // Forgot Password
    document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) {
        showCustomPopup('warning', 'Email Required', 'Please enter your email address first.', 'OK');
        return;
      }
      auth.sendPasswordResetEmail(email)
        .then(() => {
          showCustomPopup('success', 'Password Reset Email Sent',
            `✅ Password reset email sent to ${email}\nPlease check your inbox.`, 'OK');
        })
        .catch((error) => {
          showCustomPopup('error', 'Error', `❌ ${error.message}`, 'OK');
        });
    });

    // Sign In with Email
    document.getElementById('emailSignInBtn').addEventListener('click', function() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');

      if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        errorEl.style.display = 'block';
        return;
      }

      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
      errorEl.style.display = 'none';

      auth.signInWithEmailAndPassword(email, password)
        .then((result) => {
          if (!result.user.emailVerified) {
            auth.signOut();
            errorEl.textContent = '⚠️ Please verify your email first.';
            errorEl.style.display = 'block';
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            showCustomPopup('warning', 'Email Not Verified',
              'Please verify your email first.\nCheck your inbox for the verification link.', 'OK');
            return;
          }
          console.log('Email sign in successful:', result.user.email);
          closeLoginPopup();
          location.reload();
        })
        .catch((error) => {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
          this.disabled = false;
          this.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
          showCustomPopup('error', 'Sign In Failed', `❌ ${error.message}`, 'OK');
        });
    });

    // Sign Up with Email
    document.getElementById('emailSignUpBtn').addEventListener('click', function() {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      const errorEl = document.getElementById('signupError');
      const successEl = document.getElementById('signupSuccess');

      if (!name || !email || !password) {
        errorEl.textContent = 'Please fill all fields.';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }

      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      auth.createUserWithEmailAndPassword(email, password)
        .then((result) => {
          return result.user.updateProfile({ displayName: name })
            .then(() => result.user.sendEmailVerification())
            .then(() => result.user);
        })
        .then((user) => {
          successEl.textContent = '✅ Verification email sent to ' + email;
          successEl.style.display = 'block';
          console.log('Account created:', user.email);
          auth.signOut();
          this.disabled = false;
          this.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          showCustomPopup('success', 'Account Created!',
            `✅ Verification email sent to ${email}\nPlease check your email to verify.`,
            'OK', function() { closeLoginPopup(); });
        })
        .catch((error) => {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
          this.disabled = false;
          this.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          showCustomPopup('error', 'Account Creation Failed', `❌ ${error.message}`, 'OK');
        });
    });

    // Google Sign In
    function handleGoogleSignIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      auth.signInWithPopup(provider)
        .then((result) => {
          console.log('Google sign in successful:', result.user.email);
          closeLoginPopup();
          location.reload();
        })
        .catch((error) => {
          showCustomPopup('error', 'Google Sign In Failed', `❌ ${error.message}`, 'OK');
        });
    }

    document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleSignIn);
    document.getElementById('googleSignUpBtn').addEventListener('click', handleGoogleSignIn);

    // Enter key support
    document.querySelectorAll('.login-box input').forEach(input => {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          const activeTab = document.querySelector('.tab-content.active');
          const btn = activeTab.querySelector('.email-btn');
          if (btn) btn.click();
        }
      });
    });
  }

  function closeLoginPopup() {
    const overlayEl = document.getElementById('loginOverlay');
    if (overlayEl) overlayEl.remove();
    loginPopupShown = false;
  }

  // ============================================================
  // HEADER SIGN IN BUTTON
  // ============================================================
  headerSignInBtn.addEventListener('click', function() {
    const user = auth.currentUser;
    if (user) {
      showCustomPopup('info', 'Signed In', `You are signed in as ${user.email}`, 'OK');
    } else {
      showLoginPopup();
    }
  });

  // ============================================================
  // LOAD APKs
  // ============================================================
  function loadAPKs() {
    apkGrid.innerHTML = '<div class="loading-apps"><i class="fas fa-spinner fa-spin"></i> Loading apps...</div>';

    db.collection('apks').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
      if (snapshot.empty) {
        apkGrid.innerHTML = '<div class="no-apps">No apps uploaded yet.</div>';
        return;
      }

      apkGrid.innerHTML = '';
      snapshot.forEach((doc) => {
        const data = doc.data();
        const id = doc.id;
        const div = document.createElement('div');
        div.className = 'apk-card-page';
        div.innerHTML = `
          <img class="apk-logo" src="${data.logo || 'https://picsum.photos/seed/'+id+'/100/100'}" alt="${data.name}" />
          <h4>${data.name}</h4>
          <p class="apk-desc">${data.shortDesc || ''}</p>
          <p class="apk-detail">${data.details || ''}</p>
          <button class="download-btn" data-link="${data.link}" data-name="${data.name}">
            <i class="fas fa-download"></i> Download
          </button>
          <span class="lock-icon"><i class="fas fa-lock"></i></span>
        `;
        apkGrid.appendChild(div);

        const btn = div.querySelector('.download-btn');
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const user = auth.currentUser;
          if (user) {
            window.open(this.dataset.link, '_blank');
          } else {
            // Show login popup if not signed in
            showLoginPopup();
          }
        });
      });
    }, (error) => {
      console.error('Error loading APKs:', error);
      apkGrid.innerHTML = '<div class="no-apps" style="color:#ff4444;">Error loading apps. Please refresh.</div>';
    });
  }

  // ============================================================
  // AUTH STATE OBSERVER
  // ============================================================
  auth.onAuthStateChanged((user) => {
    checkAdminMenu();
    loadDynamicPages();

    if (user) {
      pageSubText.innerHTML = `✅ Signed in as <strong>${user.email}</strong> — You can download apps`;
      headerSignInBtn.innerHTML = `<i class="fas fa-user"></i> ${user.displayName || user.email.split('@')[0]}`;
      const existing = document.querySelector('.login-overlay');
      if (existing) {
        existing.remove();
        loginPopupShown = false;
      }
      loadAPKs();
    } else {
      pageSubText.innerHTML = '🔐 Please sign in to view and download Pro APKs';
      headerSignInBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      loadAPKs();
      // NO AUTO POPUP - user must click download button
    }
  });

  // ============================================================
  // INITIAL CHECK
  // ============================================================
  if (typeof firebase === 'undefined') {
    showCustomPopup('error', 'Firebase Error', 'Firebase is not loaded. Please refresh the page.',
      'Refresh', function() { location.reload(); });
  } else {
    console.log('Firebase loaded successfully');
  }

  console.log('Pro APKs page loaded successfully!');
</script>
</body>
</html>
